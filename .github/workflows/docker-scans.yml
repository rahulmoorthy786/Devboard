# Goal - Ensure the docker file and Docker Images are scanned for any vulnerabilities and security issues.

name: Docker Scans


on:
    workflow_call:

jobs:
    docker-files-lint-and-scan:
        runs-on: ubuntu-latest
        strategy:
            fail-fast: false
            matrix:
                folder: [frontend, backend]
        steps:
            - name: Checkout Code
              uses: actions/checkout@v7
                
            - name: ${{ matrix.folder }} Dockerfile Lint
              uses: hadolint/hadolint-action@v3.1.0
              with:
                dockerfile: ${{ matrix.folder }}/Dockerfile
            
            - name: Docker Setup [Login]
              uses: docker/login-action@v4
              with: 
                username: ${{ vars.DOCKERHUB_USERNAME }}
                password: ${{ secrets.DOCKERHUB_TOKEN }}
      
            - name: Docker build and push
              run: docker build -t ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folder }}:latest .
              working-directory: ${{ matrix.folder }}
      
            - name: Run Trivy vulnerability scanner
              uses: aquasecurity/trivy-action@v0.36.0
              with:
                image-ref: ${{ vars.DOCKERHUB_USERNAME }}/devboard-${{ matrix.folder }}:latest
                format: 'table'
                exit-code: '1'
                ignore-unfixed: true
                vuln-type: 'os,library'
                severity: 'CRITICAL,HIGH'  

                


